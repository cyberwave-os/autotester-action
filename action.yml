name: "Autotester OSS E2E Testing"
description: "Run AI-powered E2E tests for your codebase"
author: "cyberwaveos"
branding:
  icon: "check-square"
  color: "orange"

inputs:
  action-type:
    description: "Type of tests to run (currently only e2e is supported)"
    required: false
    default: "e2e"
  config-file:
    description: "Path to the YAML configuration file (defaults to autotester.yml). Can also be set via AUTOTESTER_CONFIG env var."
    required: false
    default: ""
  verbose:
    description: "Enable verbose logging output"
    required: false
    default: "false"
  # Secrets / URLs can be provided either as inputs (recommended; explicit and
  # not dependent on env propagation through composite actions) or via env
  # vars on the step that calls this action. When both are set, the `with:`
  # input wins.
  openai-api-key:
    description: "OpenAI API key. Alternative to setting OPENAI_API_KEY via env:."
    required: false
    default: ""
  base-url:
    description: "Base URL to combine with relative test URLs (e.g. https://staging.example.com). Alternative to AUTOTESTER_BASE_URL env var."
    required: false
    default: ""
  auth-username:
    description: "HTTP Basic Auth username. Alternative to AUTOTESTER_AUTH_USERNAME env var."
    required: false
    default: ""
  auth-password:
    description: "HTTP Basic Auth password. Alternative to AUTOTESTER_AUTH_PASSWORD env var."
    required: false
    default: ""
  posthog-api-key:
    description: "Posthog personal API key for session replay links on failed tests. Alternative to POSTHOG_PERSONAL_API_KEY env var."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install Chrome
      shell: bash
      run: |
        if [ "$(uname)" == "Linux" ]; then
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # Start Chrome in the background with remote debugging enabled
          google-chrome --remote-debugging-port=9222 --no-sandbox --headless &
          echo "CHROME_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV
        elif [ "$(uname)" == "Darwin" ]; then
          # Start Chrome in the background with remote debugging enabled
          "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --remote-debugging-port=9222 --headless &
          echo "CHROME_PATH=/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" >> $GITHUB_ENV
        else
          echo "Unsupported operating system"
          exit 1
        fi
        # Wait for Chrome to start
        sleep 5

    - name: Install uv
      shell: bash
      run: |
        pip install uv

    - name: Install Autotester
      shell: bash
      run: |
        pip install "autotester>=0.1.1"

    - name: Install browser-use browsers
      shell: bash
      run: |
        browser-use install

    # Resolve final values for the autotester CLI step.
    #
    # Each env var can come from two places:
    #   1. `inputs.*` on this action (explicit, via `with:` on the caller)
    #   2. An env var set on the calling workflow (e.g. via $GITHUB_ENV or
    #      a job/workflow-level `env:` block)
    #
    # We MUST NOT redeclare `env: FOO: ${{ env.FOO }}` on the CLI run step,
    # because step-level `env:` on the caller does NOT reliably propagate
    # into a composite action's `${{ env }}` context. Doing so would silently
    # set `FOO=""` and overwrite whatever the caller actually provided via
    # env. Instead, we compute the effective values here and emit them
    # through $GITHUB_ENV, which IS reliably visible to later composite
    # steps.
    - name: Resolve Autotester env
      shell: bash
      env:
        INPUT_OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_AUTH_USERNAME: ${{ inputs.auth-username }}
        INPUT_AUTH_PASSWORD: ${{ inputs.auth-password }}
        INPUT_POSTHOG_API_KEY: ${{ inputs.posthog-api-key }}
      run: |
        set -u
        # Emit $name=$value to $GITHUB_ENV only when a non-empty value was
        # provided via `with:`. If `with:` is empty, we leave whatever the
        # caller may already have set via env: / $GITHUB_ENV untouched.
        emit_if_set() {
          local name="$1"
          local value="$2"
          if [ -n "$value" ]; then
            printf '%s<<__AUTOTESTER_EOF__\n%s\n__AUTOTESTER_EOF__\n' "$name" "$value" >> "$GITHUB_ENV"
          fi
        }
        emit_if_set OPENAI_API_KEY "$INPUT_OPENAI_API_KEY"
        emit_if_set AUTOTESTER_BASE_URL "$INPUT_BASE_URL"
        emit_if_set AUTOTESTER_AUTH_USERNAME "$INPUT_AUTH_USERNAME"
        emit_if_set AUTOTESTER_AUTH_PASSWORD "$INPUT_AUTH_PASSWORD"
        emit_if_set POSTHOG_PERSONAL_API_KEY "$INPUT_POSTHOG_API_KEY"

    - name: Run Autotester E2E Tests
      shell: bash
      run: |
        if [ "${{ inputs.action-type }}" != "e2e" ]; then
          echo "Only action-type=e2e is supported."
          exit 1
        fi

        VERBOSE_FLAG=""
        if [ "${{ inputs.verbose }}" == "true" ]; then
          VERBOSE_FLAG="--verbose"
        fi

        CONFIG_OPTION=""
        if [ -n "${{ inputs.config-file }}" ]; then
          CONFIG_OPTION="--config ${{ inputs.config-file }}"
        fi

        autotester e2e $VERBOSE_FLAG $CONFIG_OPTION
      env:
        # CHROME_PATH is set via $GITHUB_ENV in the "Install Chrome" step and
        # the autotester CLI expects it under the name CHROME_INSTANCE_PATH.
        # All other env vars (OPENAI_API_KEY, AUTOTESTER_BASE_URL,
        # AUTOTESTER_AUTH_*, POSTHOG_PERSONAL_API_KEY, AUTOTESTER_CONFIG) are
        # either forwarded through $GITHUB_ENV by the "Resolve Autotester
        # env" step or inherited from the caller's env. We MUST NOT redeclare
        # them here with `${{ env.FOO }}` because that would overwrite them
        # with "" whenever they were set via step-level `env:` on the caller
        # (step-level env does not propagate into the composite `env`
        # context).
        CHROME_INSTANCE_PATH: ${{ env.CHROME_PATH }}
