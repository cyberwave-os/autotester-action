name: "Autotester OSS E2E Testing"
description: "Run AI-powered E2E tests for your codebase"
author: "cyberwaveos"
branding:
  icon: "check-square"
  color: "orange"

inputs:
  action-type:
    description: "Type of tests to run (currently only e2e is supported)"
    required: false
    default: "e2e"
  config-file:
    description: "Path to the YAML configuration file (defaults to autotester.yml). Can also be set via AUTOTESTER_CONFIG env var."
    required: false
    default: ""
  verbose:
    description: "Enable verbose logging output"
    required: false
    default: "false"
  # Secrets / URLs can be provided either as inputs (recommended; explicit and
  # not dependent on env propagation through composite actions) or via env
  # vars on the step that calls this action. When both are set, the `with:`
  # input wins.
  openai-api-key:
    description: "OpenAI API key. Alternative to setting OPENAI_API_KEY via env:."
    required: false
    default: ""
  base-url:
    description: "Base URL to combine with relative test URLs (e.g. https://staging.example.com). Alternative to AUTOTESTER_BASE_URL env var."
    required: false
    default: ""
  auth-username:
    description: "HTTP Basic Auth username. Alternative to AUTOTESTER_AUTH_USERNAME env var."
    required: false
    default: ""
  auth-password:
    description: "HTTP Basic Auth password. Alternative to AUTOTESTER_AUTH_PASSWORD env var."
    required: false
    default: ""
  posthog-api-key:
    description: "Posthog personal API key for session replay links on failed tests. Alternative to POSTHOG_PERSONAL_API_KEY env var."
    required: false
    default: ""
  model:
    description: "LLM model to drive the browser agent (e.g. gpt-5.4-mini, gpt-4o). Overrides any `model:` set in autotester.yml. Alternative to AUTOTESTER_MODEL env var."
    required: false
    default: ""
  upload-artifacts:
    description: "Upload the .autotester/ directory (videos + JSON/XML reports) as a workflow artifact named `autotester-results`. Set to 'false' to disable and use the `recordings-path` output to upload yourself."
    required: false
    default: "true"
  artifact-name:
    description: "Name of the workflow artifact to upload when `upload-artifacts` is true."
    required: false
    default: "autotester-results"
  artifact-retention-days:
    description: "Number of days to retain the uploaded artifact. Defaults to GitHub's repository setting."
    required: false
    default: ""

outputs:
  recordings-path:
    description: "Filesystem path to the directory containing per-test MP4 recordings (relative to the workflow workspace)."
    value: ${{ steps.collect-artifacts.outputs.recordings-path }}
  results-path:
    description: "Filesystem path to the .autotester/ directory containing all reports (e2e.json, e2e.xml) and recordings."
    value: ${{ steps.collect-artifacts.outputs.results-path }}
  results-json:
    description: "Filesystem path to the e2e.json report."
    value: ${{ steps.collect-artifacts.outputs.results-json }}
  results-xml:
    description: "Filesystem path to the e2e.xml JUnit report."
    value: ${{ steps.collect-artifacts.outputs.results-xml }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install Chrome
      shell: bash
      run: |
        if [ "$(uname)" == "Linux" ]; then
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # Start Chrome in the background with remote debugging enabled
          google-chrome --remote-debugging-port=9222 --no-sandbox --headless &
          echo "CHROME_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV
        elif [ "$(uname)" == "Darwin" ]; then
          # Start Chrome in the background with remote debugging enabled
          "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --remote-debugging-port=9222 --headless &
          echo "CHROME_PATH=/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" >> $GITHUB_ENV
        else
          echo "Unsupported operating system"
          exit 1
        fi
        # Wait for Chrome to start
        sleep 5

    - name: Install uv
      shell: bash
      run: |
        pip install uv

    - name: Install Autotester
      shell: bash
      run: |
        # autotester>=0.1.4 already pulls in `browser-use[video]`, which
        # bundles imageio[ffmpeg] for local MP4 recording of every test.
        pip install "autotester>=0.1.4"

    - name: Install browser-use browsers
      shell: bash
      run: |
        browser-use install

    # Resolve final values for the autotester CLI step.
    #
    # Each env var can come from two places:
    #   1. `inputs.*` on this action (explicit, via `with:` on the caller)
    #   2. An env var set on the calling workflow (e.g. via $GITHUB_ENV or
    #      a job/workflow-level `env:` block)
    #
    # We MUST NOT redeclare `env: FOO: ${{ env.FOO }}` on the CLI run step,
    # because step-level `env:` on the caller does NOT reliably propagate
    # into a composite action's `${{ env }}` context. Doing so would silently
    # set `FOO=""` and overwrite whatever the caller actually provided via
    # env. Instead, we compute the effective values here and emit them
    # through $GITHUB_ENV, which IS reliably visible to later composite
    # steps.
    - name: Resolve Autotester env
      shell: bash
      env:
        INPUT_OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_AUTH_USERNAME: ${{ inputs.auth-username }}
        INPUT_AUTH_PASSWORD: ${{ inputs.auth-password }}
        INPUT_POSTHOG_API_KEY: ${{ inputs.posthog-api-key }}
        INPUT_MODEL: ${{ inputs.model }}
      run: |
        set -u
        # Emit $name=$value to $GITHUB_ENV only when a non-empty value was
        # provided via `with:`. If `with:` is empty, we leave whatever the
        # caller may already have set via env: / $GITHUB_ENV untouched.
        emit_if_set() {
          local name="$1"
          local value="$2"
          if [ -n "$value" ]; then
            printf '%s<<__AUTOTESTER_EOF__\n%s\n__AUTOTESTER_EOF__\n' "$name" "$value" >> "$GITHUB_ENV"
          fi
        }
        emit_if_set OPENAI_API_KEY "$INPUT_OPENAI_API_KEY"
        emit_if_set AUTOTESTER_BASE_URL "$INPUT_BASE_URL"
        emit_if_set AUTOTESTER_AUTH_USERNAME "$INPUT_AUTH_USERNAME"
        emit_if_set AUTOTESTER_AUTH_PASSWORD "$INPUT_AUTH_PASSWORD"
        emit_if_set POSTHOG_PERSONAL_API_KEY "$INPUT_POSTHOG_API_KEY"
        emit_if_set AUTOTESTER_MODEL "$INPUT_MODEL"

    - name: Run Autotester E2E Tests
      id: run-tests
      shell: bash
      run: |
        if [ "${{ inputs.action-type }}" != "e2e" ]; then
          echo "Only action-type=e2e is supported."
          exit 1
        fi

        VERBOSE_FLAG=""
        if [ "${{ inputs.verbose }}" == "true" ]; then
          VERBOSE_FLAG="--verbose"
        fi

        CONFIG_OPTION=""
        if [ -n "${{ inputs.config-file }}" ]; then
          CONFIG_OPTION="--config ${{ inputs.config-file }}"
        fi

        # We capture autotester's exit status but DON'T fail the step here:
        # the artifact-collection / upload steps below run even on failure
        # (`if: always()`), so we always preserve videos and reports for
        # debugging. The actual workflow status is propagated by the final
        # "Report autotester status" step.
        set +e
        autotester e2e $VERBOSE_FLAG $CONFIG_OPTION
        echo "exit-code=$?" >> "$GITHUB_OUTPUT"
        set -e
      env:
        # CHROME_PATH is set via $GITHUB_ENV in the "Install Chrome" step and
        # the autotester CLI expects it under the name CHROME_INSTANCE_PATH.
        # All other env vars (OPENAI_API_KEY, AUTOTESTER_BASE_URL,
        # AUTOTESTER_AUTH_*, POSTHOG_PERSONAL_API_KEY, AUTOTESTER_CONFIG) are
        # either forwarded through $GITHUB_ENV by the "Resolve Autotester
        # env" step or inherited from the caller's env. We MUST NOT redeclare
        # them here with `${{ env.FOO }}` because that would overwrite them
        # with "" whenever they were set via step-level `env:` on the caller
        # (step-level env does not propagate into the composite `env`
        # context).
        CHROME_INSTANCE_PATH: ${{ env.CHROME_PATH }}

    # Collect the produced artifacts and expose their paths as step outputs.
    # Runs on success AND failure so failed runs still surface their videos.
    - name: Collect Autotester artifacts
      id: collect-artifacts
      if: always()
      shell: bash
      run: |
        RESULTS_DIR=".autotester"
        RECORDINGS_DIR="$RESULTS_DIR/videos"
        RESULTS_JSON="$RESULTS_DIR/e2e.json"
        RESULTS_XML="$RESULTS_DIR/e2e.xml"

        echo "results-path=$RESULTS_DIR" >> "$GITHUB_OUTPUT"
        echo "recordings-path=$RECORDINGS_DIR" >> "$GITHUB_OUTPUT"
        echo "results-json=$RESULTS_JSON" >> "$GITHUB_OUTPUT"
        echo "results-xml=$RESULTS_XML" >> "$GITHUB_OUTPUT"

        if [ -d "$RECORDINGS_DIR" ]; then
          VIDEO_COUNT=$(find "$RECORDINGS_DIR" -type f -name '*.mp4' | wc -l | tr -d ' ')
          echo "Captured $VIDEO_COUNT MP4 recording(s) in $RECORDINGS_DIR"
        else
          echo "No recordings directory found (autotester may have failed before any test ran)."
        fi

    # Upload the .autotester/ folder as a workflow artifact. Disable with
    # `with: upload-artifacts: 'false'` if you'd rather upload the
    # `recordings-path` output yourself (e.g. to S3 or a different artifact
    # name).
    - name: Upload Autotester artifacts
      if: ${{ always() && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: .autotester/
        if-no-files-found: ignore
        retention-days: ${{ inputs.artifact-retention-days }}

    # Re-emit autotester's exit status so the calling workflow's job fails
    # when any E2E test failed. Without this, the action would always be
    # considered successful because the test step itself swallows the
    # non-zero exit (we did that on purpose so artifacts upload first).
    - name: Report autotester status
      if: always()
      shell: bash
      run: |
        EXIT_CODE="${{ steps.run-tests.outputs.exit-code }}"
        if [ -z "$EXIT_CODE" ]; then
          # The run-tests step never produced an output (e.g. it was
          # skipped or crashed before assigning). Treat that as failure
          # so we don't silently mark a broken run as green.
          EXIT_CODE=1
        fi
        exit "$EXIT_CODE"
