name: Autotester E2E CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    # Optional: Add conditions on when to run E2E tests
    # if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Autotester E2E Tests
        uses: cyberwave-os/autotester-action@v0.2.0
        with:
          action-type: "e2e"
          config-file: "autotester.yml"
          verbose: "true"
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          # Optional: Override the base URL from autotester.yml
          # base-url: "https://staging.example.com"
          # Optional: HTTP Basic Auth for protected dev/staging environments
          # auth-username: ${{ secrets.AUTOTESTER_AUTH_USERNAME }}
          # auth-password: ${{ secrets.AUTOTESTER_AUTH_PASSWORD }}
          # Optional: Posthog session replay - get recording links for failed tests
          # posthog-api-key: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
