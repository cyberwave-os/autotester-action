name: Autotester E2E CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    # Optional: Add conditions on when to run E2E tests
    # if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Autotester E2E Tests
        id: autotester
        uses: cyberwave-os/autotester-action@v0.3.0
        with:
          action-type: "e2e"
          config-file: "autotester.yml"
          verbose: "true"
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          # Optional: Override the base URL from autotester.yml
          # base-url: "https://staging.example.com"
          # Optional: HTTP Basic Auth for protected dev/staging environments
          # auth-username: ${{ secrets.AUTOTESTER_AUTH_USERNAME }}
          # auth-password: ${{ secrets.AUTOTESTER_AUTH_PASSWORD }}
          # Optional: Posthog session replay - get recording links for failed tests
          # posthog-api-key: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          # Optional: disable the built-in artifact upload if you'd rather
          # ship the videos somewhere else yourself (see step below).
          # upload-artifacts: "false"

      # The action already uploads `.autotester/` as a workflow artifact
      # named `autotester-results`. The block below shows how to upload
      # the videos somewhere else (e.g. S3) using the action's outputs.
      # Remove or comment out if you only want the default artifact.
      #
      # - name: Push recordings to S3
      #   if: always()
      #   run: |
      #     aws s3 cp \
      #       "${{ steps.autotester.outputs.recordings-path }}" \
      #       "s3://my-bucket/autotester/${{ github.run_id }}/" \
      #       --recursive
